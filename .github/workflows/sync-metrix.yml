name: Sync Metrix Data

on:
  schedule:
    # Cron is UTC; Melbourne is AEST (UTC+10) or AEDT (UTC+11)
    - cron: '0 16 * * *' # 2am AEST / 3am AEDT
    - cron: '0 4 * * *'  # 2pm AEST / 3pm AEDT
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Fetch Metrix data
        # Season IDs are configured in the script (SEASON_IDS).
        run: pnpm tsx scripts/fetch-metrix-data.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/metrix/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync Metrix data [automated]"
            git push
          fi
